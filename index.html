<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑巷 - 秘密花园</title>
    <!-- 引入配置：加上时间戳防止 GitHub 缓存旧链接 -->
    <script>document.write('<script src="config.js?v=' + Date.now() + '"><\/script>');</script>
    
    <style>
        /* 这里是接回来的小黑巷酷炫样式 */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:"Microsoft YaHei",Arial,sans-serif;background:#000;color:#fff;min-height:100vh;overflow-x:hidden}
        .announcement{background:linear-gradient(90deg,#ff8a00,#e52e71);color:#fff;text-align:center;padding:8px 0;font-weight:bold;font-size:15px;overflow:hidden;white-space:nowrap}
        .announcement-content{display:inline-block;animation:scroll 15s linear infinite}
        @keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
        .header{text-align:center;padding:16px;background:linear-gradient(135deg,#9c27b0,#e91e63);font-weight:bold;font-size:19px;text-shadow:0 0 12px #ff00ff;animation:glow 2s infinite}
        @keyframes glow{0%,100%{text-shadow:0 0 12px #ff00ff,0 0 24px #ff0000}50%{text-shadow:0 0 6px #fff}}
        .tiles-container{padding:18px;display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:1000px;margin:0 auto}
        @media(min-width:768px){.tiles-container{grid-template-columns:repeat(3,1fr);gap:22px}}
        .tile{height:188px;border-radius:28px;position:relative;overflow:hidden;cursor:pointer;padding:6px;background:linear-gradient(45deg,#ff0040,#ff8c00,#ff0,#00ff00,#00ffff,#0066ff,#8b00ff,#ff0040);background-size:400% 400%;animation:rainbow 20s linear infinite;box-shadow:0 8px 25px rgba(0,0,0,0.6);transition:transform .35s ease,box-shadow .35s ease;text-decoration:none}
        .tile:hover{transform:translateY(-10px);box-shadow:0 20px 45px rgba(0,0,0,0.85)}
        @keyframes rainbow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .tile-inner{width:100%;height:100%;border-radius:22px;overflow:hidden;position:relative;background:#000}
        .tile-bg{position:absolute;top:0;left:0;right:0;bottom:0;background-size:cover !important;background-position:center !important;transform:scale(1.02)}
        .tile::after{content:'';position:absolute;left:0;right:0;bottom:0;height:75%;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.9))}
        .tile-content{position:absolute;bottom:16px;left:0;right:0;text-align:center;z-index:2;padding:0 12px}
        .tile-title{font-size:19px;font-weight:bold;color:#fff;text-shadow:0 0 12px #00ffff,0 0 20px #00ffff;margin-bottom:3px}
        .tile-desc{font-size:13.5px;line-height:1.4;color:#fff;text-shadow:0 0 10px #00ffff}
        .profile-card{max-width:1000px;margin:20px auto;padding:20px;background:rgba(255,255,255,0.15);border-radius:16px;backdrop-filter:blur(12px);box-shadow:0 8px 25px rgba(0,0,0,0.3);display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
        .profile-avatar{width:90px;height:90px;border-radius:50%;overflow:hidden;border:4px solid rgba(255,255,255,0.5);box-shadow:0 4px 15px rgba(0,0,0,0.3)}
        .profile-avatar img{width:100%;height:100%;object-fit:cover}
        .profile-info h3{margin:0 0 8px;font-size:20px;color:#ffd700}
        .profile-info p{margin:4px 0;font-size:14px;line-height:1.5;color:#eee;transition: opacity 0.5s;}
        .backup-section{max-width:1000px;margin:40px auto;padding:20px;background:linear-gradient(45deg,#ff0000,#ff7300);border-radius:16px;text-align:center;color:#fff}
        .qr-container{display:flex;justify-content:center;gap:30px;flex-wrap:wrap}
        .qr-item p{margin:8px 0;font-weight:bold}
        .qr-item img{width:160px;height:160px;border-radius:12px;border:4px solid #fff;box-shadow:0 6px 20px rgba(0,0,0,0.6)}
    </style>
</head>
<body>

    <div class="announcement"><div class="announcement-content">防止影片掉失，先注册再购买！！</div></div>
    <div class="header">SHADOW SENTINEL - 小黑巷离岸版</div>

    <div class="tiles-container" id="tiles-box"></div>

    <div class="profile-card">
        <div class="profile-avatar"><img src="avatar.jpg"></div>
        <div class="profile-info">
            <h3>小黑巷站长</h3>
            <p id="sig-text">加载中...</p>
        </div>
    </div>

    <div class="backup-section">
        <h3 style="font-size:26px;color:#ffd700;margin-bottom:20px;">永不失联</h3>
        <div class="qr-container" id="qr-box"></div>
    </div>

    <script>
        window.onload = function() {
            // 1. 生成卡片
            const tilesBox = document.getElementById('tiles-box');
            if(window.SHADOW_DATA) {
                SHADOW_DATA.tiles.forEach((item, index) => {
                    const imgNum = [20, 21, 22, 23, 3, 2][index];
                    tilesBox.innerHTML += `
                        <a href="${item.url}" target="_blank" class="tile">
                            <div class="tile-inner">
                                <div class="tile-bg" style="background-image:url('images${imgNum}.jpg');"></div>
                                <div class="tile-content">
                                    <div class="tile-title">${item.title}</div>
                                    <div class="tile-desc">点击立即进入</div>
                                </div>
                            </div>
                        </a>`;
                });

                // 2. 生成二维码
                const qrBox = document.getElementById('qr-box');
                const qrList = [
                    { name: '最强短门', url: SHADOW_DATA.backups.short, color: '#ff0066' },
                    { name: '稳定老域名', url: SHADOW_DATA.backups.old, color: '#00ffff' },
                    { name: 'GitHub站', url: SHADOW_DATA.backups.permanent, color: '#ffff00' }
                ];
                qrList.forEach(item => {
                    qrBox.innerHTML += `
                        <div class="qr-item">
                            <p style="color:${item.color}">${item.name}</p>
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${item.url}">
                            <p style="font-size:14px;">${item.url.replace('https://', '')}</p>
                        </div>`;
                });

                // 3. 动态签名
                let i = 0;
                const sig = document.getElementById('sig-text');
                function changeSig() {
                    sig.style.opacity = 0;
                    setTimeout(() => {
                        sig.textContent = SHADOW_DATA.signatures[i];
                        sig.style.opacity = 1;
                        i = (i + 1) % SHADOW_DATA.signatures.length;
                    }, 500);
                }
                changeSig();
                setInterval(changeSig, 5000);
            }
        };
    </script>
</body>
</html>
