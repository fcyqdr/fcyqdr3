<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑巷 - 秘密花园</title>
    <!-- 引入配置：加上时间戳强制刷新，确保 828.cx 总是读到最新链接 -->
    <script>document.write('<script src="config.js?v=' + Date.now() + '"><\/script>');</script>
    
    <style>
        /* 核心样式：确保黑色背景和彩虹边框正确显示 */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:"Microsoft YaHei",Arial,sans-serif;background:#000;color:#fff;min-height:100vh;overflow-x:hidden}
        
        .announcement{background:linear-gradient(90deg,#ff8a00,#e52e71);color:#fff;text-align:center;padding:8px 0;font-weight:bold;font-size:15px;overflow:hidden;white-space:nowrap}
        .announcement-content{display:inline-block;animation:scroll 15s linear infinite}
        @keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

        .header{text-align:center;padding:16px;background:linear-gradient(135deg,#9c27b0,#e91e63);font-weight:bold;font-size:19px;text-shadow:0 0 12px #ff00ff;animation:glow 2s infinite}
        @keyframes glow{0%,100%{text-shadow:0 0 12px #ff00ff,0 0 24px #ff0000}50%{text-shadow:0 0 6px #fff}}

        .tiles-container{padding:18px;display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:1000px;margin:0 auto}
        @media(min-width:768px){.tiles-container{grid-template-columns:repeat(3,1fr);gap:22px}}

        .tile{height:188px;border-radius:28px;position:relative;overflow:hidden;cursor:pointer;padding:6px;background:linear-gradient(45deg,#ff0040,#ff8c00,#ff0,#00ff00,#00ffff,#0066ff,#8b00ff,#ff0040);background-size:400% 400%;animation:rainbow 20s linear infinite;box-shadow:0 8px 25px rgba(0,0,0,0.6);transition:transform .35s ease,box-shadow .35s ease;text-decoration:none}
        .tile:hover{transform:translateY(-10px);box-shadow:0 20px 45px rgba(0,0,0,0.85)}
        @keyframes rainbow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

        .tile-inner{width:100%;height:100%;border-radius:22px;overflow:hidden;position:relative;background:#000}
        .tile-bg{position:absolute;top:0;left:0;right:0;bottom:0;background-size:cover !important;background-position:center !important;transform:scale(1.02);opacity:0.8}
        .tile::after{content:'';position:absolute;left:0;right:0;bottom:0;height:75%;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.9))}
        
        .tile-content{position:absolute;bottom:16px;left:0;right:0;text-align:center;z-index:2;padding:0 12px}
        .tile-title{font-size:18px;font-weight:bold;color:#fff;text-shadow:0 0 10px #00ffff;margin-bottom:3px}
        .tile-desc{font-size:13px;color:#00ffff;font-weight:bold}

        .profile-card{max-width:600px;margin:20px auto;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);display:flex;align-items:center;gap:20px;justify-content:center}
        .profile-avatar{width:80px;height:80px;border-radius:50%;overflow:hidden;border:3px solid #ffd700}
        .profile-avatar img{width:100%;height:100%;object-fit:cover}
        .profile-info h3{color:#ffd700;margin-bottom:5px}
        #sig-text{font-size:14px;color:#eee;transition:opacity 0.5s}

        .backup-section{max-width:1000px;margin:30px auto;padding:20px;text-align:center}
        .qr-container{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:20px}
        .qr-item{background:rgba(255,255,255,0.05);padding:15px;border-radius:15px}
        .qr-item img{width:140px;height:140px;border-radius:10px;border:3px solid #fff}
        .qr-item p{margin-top:10px;font-weight:bold;font-size:14px}
        
        .btn-lost{display:block;width:80%;max-width:300px;margin:20px auto;padding:15px;background:linear-gradient(90deg,#ff0000,#ff7300);color:#fff;text-decoration:none;border-radius:50px;font-weight:bold;font-size:20px;box-shadow:0 0 20px rgba(255,0,0,0.5)}
    </style>
</head>
<body>

    <div class="announcement"><div class="announcement-content">防止影片掉失，先注册再购买！！ SHADOW SENTINEL - 小黑巷离岸版</div></div>
    <div class="header">小黑巷 - 秘密花园</div>

    <!-- 卡片容器 -->
    <div class="tiles-container" id="tiles-box"></div>

    <div class="profile-card">
        <div class="profile-avatar"><img src="avatar.jpg"></div>
        <div class="profile-info">
            <h3>小黑巷站长</h3>
            <p id="sig-text">核心数据加载中...</p>
        </div>
    </div>

    <a href="#" class="btn-lost">永不失联</a>

    <div class="backup-section">
        <div class="qr-container" id="qr-box"></div>
    </div>

    <script>
        function renderPage() {
            const tilesBox = document.getElementById('tiles-box');
            const qrBox = document.getElementById('qr-box');
            const sig = document.getElementById('sig-text');

            if (typeof SHADOW_DATA !== 'undefined') {
                // 1. 渲染卡片
                tilesBox.innerHTML = '';
                SHADOW_DATA.tiles.forEach((item, index) => {
                    // 对应你 images20.jpg 等图片资源
                    const imgNum = [20, 21, 22, 23, 3, 2][index] || 20;
                    tilesBox.innerHTML += `
                        <a href="${item.url}" target="_blank" class="tile">
                            <div class="tile-inner">
                                <div class="tile-bg" style="background:url('images${imgNum}.jpg')"></div>
                                <div class="tile-content">
                                    <div class="tile-title">${item.title}</div>
                                    <div class="tile-desc">点击立即进入</div>
                                </div>
                            </div>
                        </a>`;
                });

                // 2. 渲染二维码 (基于 828.cx 等配置)
                qrBox.innerHTML = '';
                const qrItems = [
                    { name: '最强短门', url: SHADOW_DATA.backups.short, color: '#ff0066' },
                    { name: '稳定老域名', url: SHADOW_DATA.backups.old, color: '#00ffff' },
                    { name: 'GitHub站', url: SHADOW_DATA.backups.permanent, color: '#ffff00' }
                ];
                qrItems.forEach(item => {
                    qrBox.innerHTML += `
                        <div class="qr-item">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(item.url)}">
                            <p style="color:${item.color}">${item.name}</p>
                        </div>`;
                });

                // 3. 动态签名滚动
                let sigIndex = 0;
                function rotateSig() {
                    sig.style.opacity = 0;
                    setTimeout(() => {
                        sig.textContent = SHADOW_DATA.signatures[sigIndex];
                        sig.style.opacity = 1;
                        sigIndex = (sigIndex + 1) % SHADOW_DATA.signatures.length;
                    }, 500);
                }
                rotateSig();
                setInterval(rotateSig, 5000);
            }
        }

        // 确保页面加载和资源准备就绪后运行
        window.onload = renderPage;
        // 兜底方案：如果 onload 没触发，500ms 后强制运行
        setTimeout(renderPage, 500);
    </script>
</body>
</html>
